# Inventory Backup Configuration
# 玩家背包備份系統設定

# Data storage settings
storage:
  data_dir: "userdata"

# Backup settings
backup:
  # Maximum number of backups per player (oldest are deleted when exceeded)
  max_backups_per_player: 50
  # Backup expiry in days (0 = no expiry)
  expiry_days: 15
  # Enable automatic backup on inventory change
  auto_backup_enabled: true
  # Minimum interval between automatic backups (in seconds)
  # Prevents too many backups when items are frequently moved
  auto_backup_interval: 60

# Restore settings
restore:
  # Cost to restore inventory (Vault economy) - for unverified backups
  cost: 10000.0
  # Lower cost for verified loss backups (lava, void, despawn)
  verified_loss_cost: 800.0
  # Cooldown between restores (in seconds)
  cooldown: 3600
  # Whether to require confirmation before restore
  require_confirmation: true
  # Clear current inventory before restore (prevents item duplication)
  clear_before_restore: true
  # Items that cannot be restored (to prevent abuse)
  blocked_items:
    - BEDROCK
    - COMMAND_BLOCK
    - BARRIER
    - STRUCTURE_BLOCK
    - DEBUG_STICK

# History (change-log + keyframe) settings
# Enables fine-grained inventory change tracking for rewind-by-count and
# rewind-by-time operations, plus a periodic reconcile pass for drift correction.
history:
  # Master switch for the history subsystem.
  enabled: true
  # Maximum number of change records retained per player (ring buffer).
  max_changes_per_player: 500
  # Change records older than this are trimmed (0 = no age limit).
  expiry_minutes: 1440
  # Insert a keyframe after this many changes since the last keyframe.
  keyframe_every_n_changes: 25
  # Insert a keyframe at least every N seconds while the player is online.
  keyframe_interval_seconds: 300
  # Periodic reconcile / drift-detection interval (seconds).
  reconcile_interval_seconds: 300
  # If a single reconcile pass detects more than this many drifted items,
  # broadcast to administrators with permission nekosuite.invbackup.admin
  # (only when anti_dupe.notify_admins is true).
  reconcile_drift_admin_threshold: 5
  # Diff using next-tick snapshots (recommended). Disable to use synchronous
  # diffing inside the event itself (less accurate against plugin side effects).
  next_tick_diff_enabled: true
  preview:
    # Allow the player to scrub older/newer through the preview chest GUI.
    allow_scrubbing: true

# Anti-duplication settings
anti_dupe:
  # Enable hash-based duplicate detection (skip backup if same as last)
  skip_duplicate_content: true
  # Track restored backups and prevent re-restore
  track_restored: true
  # Notify admins when suspicious activity is detected
  notify_admins: true
  # Minimum time between the same backup being restored (prevents abuse)
  restore_cooldown_per_backup: 86400
  # Only allow restoring verified loss backups (strict mode)
  # If true, only backups from lava/void/despawn deaths can be restored
  require_verified_loss: true
