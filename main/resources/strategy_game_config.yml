# NekoSuite Strategy Game Configuration
# 勇者傳說：終界之戰 (Hero's Legend: Battle of the End)
#
# 一段中世紀奇幻冒險：勇者自殘破的村莊出發，取得傳說神器，
# 沿途斬殺蜘蛛、殭屍、強盜，拯救村莊，最終於終界龍巢決戰。
#
# 所有文本字段皆使用 i18n key，於語言檔的 sgame.config 之下定義（目前以 zh_tw 為主）。

storage:
  data_dir: userdata

game:
  # 起始金幣
  starting_gold: 40
  # 起始生命值
  starting_health: 100
  # 起始戰鬥屬性
  starting_attack: 12
  starting_defense: 6
  starting_magic: 25
  # 後備關卡數：當 game.lengths 缺失或為空時才採用；正常情況下會被 default_length 對應檔位覆寫
  max_stages: 30
  # 預設流程長度檔位
  default_length: medium
  # 流程長度檔位 -> 關卡數。玩家於開始時選擇，或選「隨機」由系統抽選。
  lengths:
    short: 20
    medium: 30
    long: 50

# ============================================================
# 遊戲事件配置
# type: story (劇情/委託/鐵匠/借宿/抉擇), shop (商店), battle (戰鬥)
# weight: 隨機選擇時的基礎權重 (默認10)
# followup_events: 完成此事件後，這些事件的權重會提高
# prerequisite_events: 必須先經過這些事件才能進入
# fixed_stage: 此事件固定出現的關卡 (絕對值，0 起算)
# fixed_stage_ratio: 此事件固定出現的關卡比例 (0..1，會隨流程長度縮放)
# exclusive: true 時該關只會出現此事件 (用於最終 Boss)
# enemy_id: 戰鬥事件指定的敵人 (留空則依關卡隨機)
# requirement: 進入事件的條件 (item / item_amount / gold / gold_cost / fail_text)
#
# choices 內可用字段：
#   text / result / result_alt: i18n key
#   gold_change / health_change: 金幣 / 生命變化
#   gold_change_alt / health_change_alt: 條件不足時的替代變化
#   item_gain / item_gain_amount: 獲得虛擬物品
#   item_cost / item_cost_amount: 消耗虛擬物品
#   requirement: 選擇的條件 (item / item_amount / gold)
#   attack_change / defense_change / magic_change: 永久屬性成長
#   max_health_change / max_magic_change: 永久上限成長 (同時回復等量)
#   equip_grant: 直接獲得並裝備指定裝備 (用於神器與鐵匠強化)
#   restore_full: true 時完全恢復生命與魔力 (借宿)
# ============================================================
events:

  # ---------- 序章：覺醒 (固定錨點) ----------
  village_under_attack:
    name: "sgame.config.events.village_under_attack.name"
    type: story
