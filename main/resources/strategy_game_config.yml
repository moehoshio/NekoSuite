# ============================================================
# 戰鬥敵人配置
# 屬性: attack/defense/magic 用於戰鬥計算
# crit_chance(暴擊率%), crit_multiplier(暴擊倍率), dodge_chance(閃避率%)
# skills: 敵人特殊技能 (type: damage/heal/buff/debuff/status)
# entity_type: 真實對戰模式中生成的怪物實體類型 (Bukkit EntityType 名稱)
# ============================================================
battles:
  # 真實對戰模式：啟用後，戰鬥事件會在世界中生成真實怪物，
  # 由玩家親自擊殺；擊敗後給予與虛擬對戰相同的金幣與進度獎勵。
  # 停用時 (預設) 則維持原本的菜單/數值制虛擬對戰。
  real_battle:
    # 是否啟用真實生怪戰鬥
    enabled: false
    # 怪物生成在玩家前方的格數
    spawn_distance: 3
    # 戰鬥逾時秒數 (0 表示永不逾時)；逾時視為怪物脫戰，戰鬥取消且不給獎勵
    timeout: 120
    # 是否讓戰鬥怪物發光以利辨識
    highlight: true
    # 將怪物的最大生命值縮放為敵人配置的 health 值
    scale_health: true
    # 當敵人未指定 entity_type 時採用的預設怪物類型
    default_entity_type: ZOMBIE
  enemies:
    - id: slime
      entity_type: SLIME
      name: "sgame.config.enemies.slime.name"
      description: "sgame.config.enemies.slime.desc"
      power: 20
      damage: 8
      health: 30
      attack: 6
      defense: 2
      magic: 0
      gold_reward: 15
      min_stage: 0
      crit_chance: 5
      crit_multiplier: 1.3
      dodge_chance: 5

    - id: goblin
