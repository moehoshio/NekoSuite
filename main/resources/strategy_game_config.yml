        result: "sgame.config.events.village_under_attack.choice1.result"
        gold_change: 0
        health_change: -15
        attack_change: 3
        item_gain: village_token
        item_gain_amount: 1
      - text: "sgame.config.events.village_under_attack.choice2.text"
        result: "sgame.config.events.village_under_attack.choice2.result"
