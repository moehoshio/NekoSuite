  cannot_use_here: "&c✖ &7這個物品不能在這裡使用。"
  # Config texts - Events
  config:
    events:
      village_under_attack:
        name: '&c✦ 烈焰村莊'
        desc1: '&7破曉時分，怪潮自黑森林湧出，黎明村陷入火海。'
        desc2: '&7父老在烈焰中倒下，孩童的哭聲撕裂晨霧。'
        desc3: '&7身為村中唯一還能握劍的年輕人——你別無退路。'
        choice1:
          text: '&f挺身而出，正面迎敵'
          result: '&7你揮舞斷劍殺入火場，身上添了傷，卻也悟得殺意。村民因你而得救。'
        choice2:
          text: '&f先護送老弱撤離'
          result: '&7你背起傷者衝出火巷，村民塞給你一袋盤纏聊表謝意。'
        choice3:
          text: '&f趁亂搜刮可用之物'
          result: '&7你在廢墟中翻出財物與補給，雖遭村民側目，行囊卻充實了不少。'
      veteran_knight:
        name: '&e✦ 隱居的老騎士'
        desc1: '&7林間木屋裡，住著一位斷臂的老騎士。'
        desc2: '&7他凝視你良久，緩緩道出塵封的傳說與一張殘破地圖。'
        choice1:
          text: '&f聆聽他的教誨'
          result: '&7老騎士傳授你防身之道與神器祭壇的方位，臨別還為你裹傷。'
        choice2:
          text: '&f只求那張地圖'
          result: '&7你以幾枚銀幣換得地圖，老騎士搖頭嘆息，卻未阻攔。'
      artifact_altar:
        name: '&6✦ 神器祭壇'
        desc1: '&7祭壇深藏於遠古遺跡，三道神光自石座升騰。'
        desc2: '&7傳說中沉睡的神器，正等待有緣的勇者。'
        desc3: '&7你只能帶走其中一件——選擇，將定義你的戰鬥之道。'
        choice1:
          text: '&b取【聖劍·黎明】'
          result: '&7劍光如朝陽迸發，攻防兼備。你成為一名正統的劍士。'
        choice2:
          text: '&a取【破曉之弓】'
          result: '&7弓弦震顫，靈力流轉。你成為精於遠射與法術的遊俠。'
        choice3:
          text: '&c取【裂地戰斧】'
          result: '&7戰斧轟然落地，殺氣滔天。你成為摧枯拉朽的狂戰士。'
      mid_rest_camp:
        name: '&a✦ 旅途營地'
        desc1: '&7行至半途，你在溪畔紮下營地。'
        desc2: '&7篝火劈啪作響，是難得喘息的時刻。'
        choice1:
          text: '&f好好睡上一覺（-20金幣）'
          result: '&7你付錢向過路商隊買來熱食與毛毯，徹底恢復了狀態。'
        choice2:
          text: '&f靜心調息'
          result: '&7你打坐冥想，生命與魔力都有所回復。'
        choice3:
          text: '&f擦拭與保養裝備'
          result: '&7你細細打磨甲冑，防禦更為紮實。'
      blood_moon_omen:
        name: '&4✦ 血月凶兆'
        desc1: '&7夜空被染成血色，遠方傳來巨龍的低吼。'
        desc2: '&7怪物因血月而狂暴，這是抉擇的時刻。'
        choice1:
          text: '&f逆月而行，磨礪殺意'
          result: '&7你在血月下與群怪死戰，傷痕累累，劍意卻臻至新境。'
        choice2:
          text: '&f據守高地，穩紮穩打'
          result: '&7你選擇固守，養精蓄銳，防禦與心神俱穩。'
        choice3:
          text: '&f趁亂洗劫廢棄營寨'
          result: '&7你冒險搜刮，滿載而歸，也付出了流血的代價。'
      dragon_road:
        name: '&5✦ 龍巢之路'
        desc1: '&7終界的氣息撲面而來，腳下是通往龍巢的最後一段險徑。'
        desc2: '&7在踏入死地之前，你還有時間做最後的準備。'
        choice1:
          text: '&f拾取龍巢散落的鱗片'
          result: '&7你撿起一片堅硬的龍鱗，這是鍛造神兵的絕佳材料。'
        choice2:
          text: '&f在前哨補給站歇腳（-15金幣）'
          result: '&7你付費徹底休整，以最佳狀態迎接決戰。'
        choice3:
          text: '&f對著龍巢立下誓言'
          result: '&7你握緊神器立誓討龍，攻守之心皆堅如磐石。'
      final_warning:
        name: '&c✦ 決戰前夕'
        desc1: '&7空氣凝滯，連風都不敢作聲。'
        desc2: '&7洞口噴吐著灼熱的氣浪，終界龍就在裡面。'
        desc3: '&7深呼吸——這一戰，將決定大陸的命運。'
        choice1:
          text: '&f閉目養神，恢復狀態'
          result: '&7你平復呼吸，傷勢與心神都安定下來。'
        choice2:
          text: '&f默誦戰技，臨陣磨槍'
          result: '&7你在腦中推演每一招式，攻守俱有精進。'
      end_dragon:
        name: '&5&l✦ 終界龍·決戰'
        desc1: '&7龐然黑影自深淵升起，雙翼遮蔽了天光。'
        desc2: '&7這便是引發終界災厄的元兇——終界龍。'
        desc3: '&7勇者啊，舉起你的神器，終結這場噩夢吧！'
        choice1:
          text: '&c&l向終界龍發起最終決戰！'
          result: '&7你怒吼著衝向巨龍，傳說在此刻譜寫！'
      starter_shop:
        name: '&6✦ 村口雜貨鋪'
        desc1: '&7村口的老闆娘支起攤位，向你這位新晉勇者問好。'
        desc2: '&7「出門在外，補給可得備齊喔！」'
        choice1:
          text: '&f查看商品'
          result: '&7你走近攤位，挑選起趁手的物資。'
      blacksmith_forge:
        name: '&8✦ 鐵匠鋪'
        desc1: '&7爐火熊熊，鐵錘叮噹。老鐵匠抬眼打量你的兵器。'
        desc2: '&7「想變強？把傢伙交給我，外加一點誠意。」'
        choice1:
          text: '&f開鋒武器（-40金幣，攻擊+4）'
          result: '&7火星四濺，刃口寒光大盛，攻擊力提升了！'
          result_alt: '&7你囊中羞澀，鐵匠擺擺手讓你下次再來。'
        choice2:
          text: '&f加固護甲（-40金幣，防禦+4）'
          result: '&7甲片被重新鉚合，防禦更為堅實！'
          result_alt: '&7金幣不足，鐵匠只是搖頭。'
        choice3:
          text: '&f以龍鱗覺醒神器（-60金幣＋龍鱗，攻+8防+4）'
          result: '&7龍鱗熔入神器，迸發出耀眼的光輝——神器覺醒了！'
          result_alt: '&7缺少龍鱗或金幣，覺醒之事只能作罷。'
        choice4:
          text: '&f只是看看就走'
          result: '&7你向鐵匠道別，繼續上路。'
      village_inn:
        name: '&e✦ 村莊旅店'
        desc1: '&7一間溫暖的小旅店，飄出燉肉與麥酒的香氣。'
        desc2: '&7老闆熱情地招呼你進門歇腳。'
        choice1:
          text: '&f開一間上房（-25金幣）'
          result: '&7一夜好眠，生命與魔力徹底恢復！'
          result_alt: '&7錢不夠開房，你只好在門廊將就。'
        choice2:
          text: '&f在大廳火爐邊小憩'
          result: '&7爐火驅散疲憊，你恢復了些許生命。'
        choice3:
          text: '&f與旅人把酒言歡'
          result: '&7談天說地間，你的心神為之一振，魔力略有回復。'
      herbalist_request:
        name: '&2✦ 藥師的委託'
        desc1: '&7村中藥師急需草藥救治傷患。'
        desc2: '&7「若你手上有三株草藥，我願以重金與藥劑相謝。」'
        choice1:
          text: '&f交出 3 株草藥'
          result: '&7藥師大喜，回贈你豐厚的金幣與一瓶治療藥劑。'
          result_alt: '&7你的草藥不足三株，藥師遺憾地搖了搖頭。'
        choice2:
          text: '&f婉拒並指點傷患去處'
          result: '&7你雖未幫上忙，卻贏得了村民的好感。'
      village_plea:
        name: '&2✦ 村民求援'
        desc1: '&7一名村民跪倒在你面前，懇求你出手。'
        desc2: '&7「惡徒與野獸正在劫掠我們，求求勇者大人！」'
        choice1:
          text: '&f慨然應允，動身討伐'
          result: '&7你點頭領命，村民含淚相謝，前方已有惡敵等候。'
        choice2:
          text: '&f索要報酬再做打算'
          result: '&7村民湊出僅有的積蓄塞給你，你才勉強答應。'
        choice3:
          text: '&f先安撫村民情緒'
          result: '&7你的寬慰讓村民稍感安心。'
      crossroad_choice:
        name: '&3✦ 命運岔路'
        desc1: '&7道路在此分作三岔，每條都通向未知。'
        desc2: '&7林深霧重，你必須做出選擇。'
        choice1:
          text: '&f走入草木茂盛的小徑'
          result: '&7沿途你採得草藥，也撿到些散落的銀幣。'
        choice2:
          text: '&f取道靜謐的溪谷'
          result: '&7溪水清涼，你飲後神清氣爽，魔力為之充盈。'
        choice3:
          text: '&f穿越險峻的峭壁捷徑'
          result: '&7你抄了近路尋得財寶，卻也在攀爬中掛了彩。'
      training_grounds:
        name: '&9✦ 傭兵訓練場'
        desc1: '&7一群傭兵正在校場操練，教官向你招手。'
        desc2: '&7「想學兩手？拿錢來，我教你保命的真本事。」'
        choice1:
          text: '&f參加劍術特訓（-20金幣，攻擊+3）'
          result: '&7一番苦練後，你的劍法更為凌厲。'
          result_alt: '&7學費不夠，教官只丟給你一句『下次再來』。'
        choice2:
          text: '&f修習冥想吐納（-20金幣，魔力上限+8）'
          result: '&7你領悟了引導靈力之法，魔力上限提升了。'
          result_alt: '&7沒有束脩，導師婉拒了你。'
        choice3:
          text: '&f在一旁觀摩就好'
          result: '&7你看了一會兒，略有心得便離開了。'
      forest_crossroads:
        name: '&2✦ 森林岔口'
        desc1: '&7茂密的森林中出現一個岔口。'
        desc2: '&7不同的道路或許通向不同的機遇。'
        choice1:
          text: '&f走光明大道'
          result: '&7你穩妥前行，途中拾得草藥與少許金幣。'
        choice2:
          text: '&f抄陰暗捷徑'
          result: '&7憑著村莊信物的庇佑，你安然取得豐厚財物。'
          result_alt: '&7沒有信物護身，捷徑暗藏陷阱，你受了傷才脫身。'
        choice3:
          text: '&f原地紮營休息'
          result: '&7你稍作休整，恢復了些許體力。'
      mysterious_merchant:
        name: '&6✦ 神秘商人'
        desc1: '&7一位披斗篷的商人攔住你的去路。'
        desc2: '&7「客官，看看我的好東西？包你不虛此行。」'
        choice1:
          text: '&f買下信物以備日後'
          result: '&7你收下一枚商會信物，據說能在流動商隊處兌換好貨。'
        choice2:
          text: '&f禮貌地謝絕'
          result: '&7你婉拒了商人，繼續趕路。'
        choice3:
          text: '&f豪賭一把神秘箱'
          result: '&7箱中之物令你大失所望，還虧了金幣、傷了元氣。'
      wandering_minstrel:
        name: '&d✦ 流浪吟遊詩人'
        desc1: '&7一位詩人撥動琴弦，唱起遠古的英雄史詩。'
        desc2: '&7歌聲悠揚，撫慰著旅人的疲憊。'
        choice1:
          text: '&f打賞並聆聽（-10金幣）'
          result: '&7動人的旋律讓你身心舒暢，恢復了生命。'
        choice2:
          text: '&f請教戰歌的奧義'
          result: '&7詩人傳你一段激勵心神的古調，魔力為之充盈。'
        choice3:
          text: '&f獻藝合奏賺取賞錢'
          result: '&7你與詩人合奏一曲，賺得賞錢，卻也累得夠嗆。'
      mystic_fountain:
        name: '&b✦ 神秘泉水'
        desc1: '&7林間有一汪泛著靈光的泉水。'
        desc2: '&7傳說飲之能洗滌傷痛、淬鍊心神。'
        choice1:
          text: '&f暢飲泉水'
          result: '&7清泉入喉，傷勢竟迅速癒合！'
        choice2:
          text: '&f以泉水淬鍊靈魂（-15金幣）'
          result: '&7你按古法淬鍊，魔力上限有所提升。'
        choice3:
          text: '&f採集泉邊的草藥'
          result: '&7你在泉畔採得數株珍貴草藥。'
      abandoned_mine:
        name: '&8✦ 廢棄礦坑'
        desc1: '&7一座坍塌的舊礦坑張著黑口。'
        desc2: '&7坑道深處似乎還埋著未被取盡的礦藏。'
        choice1:
          text: '&f深入挖掘礦石'
          result: '&7你掘得不少礦石換成金幣，但落石砸傷了你。'
        choice2:
          text: '&f謹慎地淺嚐輒止'
          result: '&7你只在坑口轉了轉，平安無事卻一無所獲。'
        choice3:
          text: '&f搜尋礦工遺留之物'
          result: '&7你在礦工遺物中翻出金幣，還撿到一片龍鱗！'
      ancient_shrine:
        name: '&e✦ 古老神龕'
        desc1: '&7荒野中佇立著一座斑駁的神龕。'
        desc2: '&7若無誠意（金幣）供奉，神明恐不會回應。'
        choice1:
          text: '&f虔誠供奉（-20金幣）'
          result: '&7神光籠罩，你的傷勢痊癒，還獲贈一枚祝福護符。'
        choice2:
          text: '&f取走供桌上的香火錢'
          result: '&7你拿走了金幣，卻似乎觸怒了某種存在，隱隱作痛。'
        choice3:
          text: '&f簡單參拜後離去'
          result: '&7你恭敬一拜，心緒稍寧。'
        fail_text: '&c需要至少 20 金幣才能供奉神龕。'
      treasure_chest:
        name: '&6✦ 神秘寶箱'
        desc1: '&7岔路盡頭擺著一只落塵的寶箱。'
        desc2: '&7箱上掛著一把生鏽的鎖。'
        choice1:
          text: '&f小心撬開取財'
          result: '&7你撬開寶箱取得金幣，還找到一把神秘的鑰匙。'
        choice2:
          text: '&f粗暴地砸開'
          result: '&7你一斧劈開箱子，金幣四散，飛濺的碎片卻傷了你。'
        choice3:
          text: '&f謹慎起見，不去碰它'
          result: '&7你提防有詐，繞箱而過。'
      secret_vault:
        name: '&5✦ 隱密寶庫'
        desc1: '&7寶箱中的鑰匙，竟開啟了一道隱密石門。'
        desc2: '&7門後是堆滿珍寶的古老寶庫！'
        choice1:
          text: '&f用鑰匙開啟寶庫'
          result: '&7你滿載而歸，金幣與一片珍稀龍鱗盡入囊中！'
        choice2:
          text: '&f感覺不妙，轉身離開'
          result: '&7你按捺住貪念，悄然退出了寶庫。'
        fail_text: '&c需要寶箱鑰匙才能開啟寶庫。'
      injured_traveler:
        name: '&2✦ 受傷的旅人'
        desc1: '&7路旁躺著一名受傷的旅人，氣息微弱。'
        desc2: '&7他向你投來求助的目光。'
        choice1:
          text: '&f以治療藥劑相救'
          result: '&7旅人康復後感激不盡，回贈你一大筆金幣！'
          result_alt: '&7你沒有藥劑，只能簡單包紮，旅人勉強撐住，給了你些散錢。'
        choice2:
          text: '&f背他到最近的村莊'
          result: '&7你護送旅人就醫，雖耽誤了行程，卻贏得村民的信任。'
        choice3:
          text: '&f愛莫能助，繼續趕路'
          result: '&7你嘆了口氣，留下旅人獨自上路。'
      bandit_toll:
        name: '&c✦ 強盜過路費'
        desc1: '&7一夥強盜攔住山道，獰笑著伸出手。'
        desc2: '&7「此路是我開，留下買路財！」'
        choice1:
          text: '&f乖乖交錢消災（-25金幣）'
          result: '&7你丟下金幣，強盜哈哈大笑放你過去。'
        choice2:
          text: '&f徒手與之周旋'
          result: '&7你硬闖關卡，挨了幾拳，倒也練出幾分膽氣。'
        choice3:
          text: '&f反過來洗劫強盜'
          result: '&7你出其不意制服強盜，奪走他們的不義之財，自己也掛了彩。'
      traveling_merchant_shop:
        name: '&6✦ 流動商隊'
        desc1: '&7憑著商會信物，你獲准進入流動商隊的私帳。'
        desc2: '&7琳琅滿目的稀有貨品任你挑選。'
        choice1:
          text: '&f查看稀有商品'
          result: '&7你在商隊中尋覓著趁手的好貨。'
        fail_text: '&c需要商會信物才能進入流動商隊。'
      potion_shop:
        name: '&d✦ 藥水鋪'
        desc1: '&7一間瀰漫著草藥氣味的藥水鋪。'
        desc2: '&7架上擺滿了各色瓶瓶罐罐。'
        choice1:
          text: '&f選購藥水'
          result: '&7你端詳著架上的藥劑。'
      armory:
        name: '&7✦ 武具店'
        desc1: '&7一間掛滿刀劍甲冑的武具店。'
        desc2: '&7店主拍著胸脯保證貨真價實。'
        choice1:
          text: '&f選購武器與護甲'
          result: '&7你在琳琅的兵器間細細挑選。'
      wandering_trader:
        name: '&a✦ 行腳商人'
        desc1: '&7一位牽著駝獸的行腳商人停在路邊。'
        desc2: '&7他的貨箱裡似乎藏著不少稀罕物。'
        choice1:
          text: '&f翻看貨箱'
          result: '&7你打開貨箱，挑選感興趣的商品。'
      slime_swamp:
        name: '&a⚔ 史萊姆沼澤'
        desc1: '&7泥濘的沼澤裡，黏滑的史萊姆蠕動逼近。'
        desc2: '&7它們雖弱，數量卻不少。'
        choice1:
          text: '&a迎戰史萊姆'
          result: '&7你擺開架勢，準備清理這群黏液怪。'
      goblin_raid:
        name: '&2⚔ 哥布林劫掠'
        desc1: '&7一群哥布林正在劫掠商旅。'
        desc2: '&7是時候教訓這些綠皮小鬼了。'
        choice1:
          text: '&2迎戰哥布林'
          result: '&7你拔出武器，衝向哥布林群。'
      wolf_pack:
        name: '&7⚔ 餓狼群襲'
        desc1: '&7數道綠瑩瑩的眼睛在暗處逼近。'
        desc2: '&7一群餓狼將你團團圍住。'
        choice1:
          text: '&7迎戰狼群'
          result: '&7你背靠巨石，嚴陣以待。'
      bandit_ambush:
        name: '&c⚔ 強盜伏擊'
        desc1: '&7山道兩側殺出蒙面強盜。'
        desc2: '&7他們顯然是衝著你的性命而來。'
        choice1:
          text: '&c迎戰強盜'
          result: '&7你冷笑一聲，迎上前去。'
      skeleton_crypt:
        name: '&f⚔ 骷髏地穴'
        desc1: '&7地穴中，白骨森森的骷髏兵持械而立。'
        desc2: '&7它們的空洞眼窩亮起幽火。'
        choice1:
          text: '&f迎戰骷髏'
          result: '&7你高舉武器，踏入地穴。'
      zombie_horde:
        name: '&2⚔ 殭屍潮'
        desc1: '&7腐臭撲鼻，成群的殭屍蹣跚而來。'
        desc2: '&7它們皮糙肉厚，極為難纏。'
        choice1:
          text: '&2迎戰殭屍'
          result: '&7你掩住口鼻，準備硬撼屍潮。'
      spider_nest:
        name: '&8⚔ 蜘蛛巢穴'
        desc1: '&7黏稠的蛛網佈滿洞穴，巨蛛自暗處垂下。'
        desc2: '&7毒牙在微光中閃爍。'
        choice1:
          text: '&8迎戰巨蛛'
          result: '&7你斬斷蛛絲，直面毒蛛。'
      witch_hut:
        name: '&5⚔ 女巫小屋'
        desc1: '&7詭異的小屋中，女巫正攪動著冒泡的毒鍋。'
        desc2: '&7她抬起頭，眼中閃過陰冷的光。'
        choice1:
          text: '&5迎戰女巫'
          result: '&7你提防著她的法術，步步逼近。'
      dark_knight_duel:
        name: '&8⚔ 黑暗騎士的挑戰'
        desc1: '&7一名通體漆黑的騎士橫劍攔路。'
        desc2: '&7「想過去，先過我這一關。」'
        choice1:
          text: '&8迎戰黑暗騎士'
          result: '&7你與黑騎士四目相對，殺氣陡升。'
      young_dragon:
        name: '&c⚔ 幼龍'
        desc1: '&7一頭尚未成年的火龍盤踞於山巔。'
        desc2: '&7即便是幼龍，亦有焚天之威。'
        choice1:
          text: '&c迎戰幼龍'
          result: '&7你頂住熱浪，向幼龍發起挑戰。'
      monster_ambush:
        name: '&4⚔ 怪物突襲'
        desc1: '&7毫無預兆地，一頭怪物自暗處撲出！'
        desc2: '&7你來不及多想，只能拔劍應戰。'
        choice1:
          text: '&4迎戰怪物'
          result: '&7你本能地舉起武器格擋。'
    enemies:
      slime:
        name: '&a史萊姆'
        desc: '&7沼澤中常見的黏液怪，柔軟卻黏人。'
      goblin:
        name: '&2哥布林'
        desc: '&7狡猾的綠皮小鬼，慣於偷襲與哄搶。'
        skill1:
          name: '&e偷襲'
          desc: '&7冷不防地撈一把，造成額外傷害。'
      wolf:
        name: '&7野狼'
        desc: '&7成群行動的猛獸，迅捷而兇悍。'
        skill1:
          name: '&f群嚎'
          desc: '&7狼嚎振奮獸群，發動兇猛撕咬。'
      bandit:
        name: '&c強盜'
        desc: '&7亡命之徒，下手又狠又準。'
        skill1:
          name: '&8背刺'
          desc: '&7瞄準破綻刺出致命一擊。'
      skeleton:
        name: '&f骷髏兵'
        desc: '&7被詛咒驅動的白骨戰士，擅長遠程射擊。'
        skill1:
          name: '&f擲骨'
          desc: '&7投擲尖銳的骨矛貫穿目標。'
      zombie:
        name: '&2殭屍'
        desc: '&7行動遲緩卻皮厚血多，撕咬帶有劇毒。'
        skill1:
          name: '&2腐蝕撕咬'
          desc: '&7帶有屍毒的撕咬，使目標中毒。'
      spider:
        name: '&8巨型蜘蛛'
        desc: '&7敏捷的劇毒獵手，能吐絲束縛獵物。'
        skill1:
          name: '&8蛛網束縛'
          desc: '&7噴吐黏網使目標暈眩無法行動。'
        skill2:
          name: '&2毒牙'
          desc: '&7毒牙撕咬使目標中毒流血。'
      witch:
        name: '&5女巫'
        desc: '&7操弄火焰與冰霜的施法者，極其陰險。'
        skill1:
          name: '&c火球術'
          desc: '&7擲出灼熱火球，使目標燃燒。'
        skill2:
          name: '&b寒霜詛咒'
          desc: '&7凜冬之咒使目標冰凍。'
      dark_knight:
        name: '&8黑暗騎士'
        desc: '&7墮落的精英戰士，攻守俱佳。'
        skill1:
          name: '&8暗影斬'
          desc: '&7纏繞暗影的重斬，造成大量傷害。'
        skill2:
          name: '&7盾擊'
          desc: '&7以盾猛撞使目標暈眩。'
      dragon:
        name: '&c火龍'
        desc: '&7盤踞山巔的巨龍，吐息可焚毀一切。'
        skill1:
          name: '&c龍焰吐息'
          desc: '&7噴吐烈焰，使目標長時間燃燒。'
        skill2:
          name: '&6尾掃'
          desc: '&7橫掃龍尾，造成沉重打擊。'
        skill3:
          name: '&e威嚇咆哮'
          desc: '&7震天龍吼使目標暈眩。'
      ender_dragon:
        name: '&5&l終界龍'
        desc: '&7引發終界災厄的元兇，掌控虛空與烈焰的終極存在。'
        skill1:
          name: '&5虛空吐息'
          desc: '&7噴吐熾烈的虛空之炎，造成劇烈燃燒。'
        skill2:
          name: '&d龍翼狂風'
          desc: '&7振翅掀起毀滅性的風暴，造成巨額傷害。'
        skill3:
          name: '&8終界衝撞'
          desc: '&7化作流光高速撞擊，使目標長時間暈眩。'
        skill4:
          name: '&0虛空咆哮'
          desc: '&7撕裂空間的咆哮，使目標陷入持久的虛空侵蝕。'
    equipment:
      iron_sword:
        name: '&f鐵劍'
      steel_sword:
        name: '&b精鋼劍'
      artifact_sword:
        name: '&6聖劍·黎明'
      artifact_bow:
