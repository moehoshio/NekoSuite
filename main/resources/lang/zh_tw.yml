      health_upgrade:
        name: '&6生命強化蘋果'
        effect: '&7生命上限 +20'
      lucky_coin:
        name: '&e幸運金幣'
        effect: '&7恢復 10 點生命的小確幸'
      healing_potion:
        name: '&a治療藥劑（可攜帶）'
